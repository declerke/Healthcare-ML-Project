name: Weekly Model Retraining

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv pip install -r requirements-train.txt --system

      - name: Retrain model
        run: python ml/train.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit updated model artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/model.joblib models/encoders.joblib
          git diff --staged --quiet || git commit -m "chore: retrain model $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
