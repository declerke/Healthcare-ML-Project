services:
  - type: web
    name: healthcare-ml-api
    runtime: python
    buildCommand: pip install uv && uv pip install -r requirements.txt --system
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: MODEL_PATH
        value: models/model.joblib
      - key: ENCODERS_PATH
        value: models/encoders.joblib
      - key: RETRAIN_API_KEY
        generateValue: true

databases:
  - name: healthcare-db
    databaseName: healthcare_db
    user: healthcare_user
    plan: free
